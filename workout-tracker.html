<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRO SPLIT</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Barlow+Condensed:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #1a1a1a;
    --border: #2a2a2a;
    --accent: #e8ff3b;
    --accent2: #ff4d00;
    --text: #f0f0f0;
    --muted: #666;
    --chest: #ff4d00;
    --back: #00c2ff;
    --shoulders: #a855f7;
    --legs: #22c55e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow Condensed', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,10,10,0.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    letter-spacing: 0.1em;
    color: var(--accent);
    line-height: 1;
  }
  .logo span { color: var(--text); }

  .day-pills {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .day-pills::-webkit-scrollbar { display: none; }

  .day-pill {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    letter-spacing: 0.08em;
    padding: 4px 14px;
    border-radius: 2px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .day-pill:hover { border-color: var(--accent); color: var(--accent); }
  .day-pill.active {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
  }

  /* MAIN */
  main { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }

  .day-header {
    margin-bottom: 2rem;
    animation: fadeUp 0.3s ease;
  }

  .day-number {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .day-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.5rem, 6vw, 4.5rem);
    letter-spacing: 0.04em;
    line-height: 0.9;
    display: flex;
    align-items: baseline;
    gap: 0.3em;
    flex-wrap: wrap;
  }

  .day-title .muscle-a { color: var(--accent); }
  .day-title .sep { color: var(--muted); font-size: 0.6em; }
  .day-title .muscle-b { color: var(--text); }

  /* EXERCISE CARDS */
  .exercises-grid {
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .exercise-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    transition: border-color 0.2s;
    animation: fadeUp 0.3s ease both;
  }
  .exercise-card:hover { border-color: #3a3a3a; }

  .exercise-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.875rem 1rem;
    cursor: pointer;
    user-select: none;
    gap: 1rem;
  }

  .exercise-name {
    font-size: 1.2rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    flex: 1;
  }

  .exercise-tag {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    padding: 2px 8px;
    border-radius: 2px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    flex-shrink: 0;
  }
  .tag-primary { background: rgba(232,255,59,0.12); color: var(--accent); border: 1px solid rgba(232,255,59,0.3); }
  .tag-secondary { background: rgba(255,77,0,0.1); color: var(--accent2); border: 1px solid rgba(255,77,0,0.3); }

  .exercise-chevron {
    color: var(--muted);
    font-size: 1rem;
    transition: transform 0.2s;
    flex-shrink: 0;
  }
  .exercise-card.open .exercise-chevron { transform: rotate(180deg); }

  .exercise-body {
    display: none;
    padding: 0 1rem 1rem;
    border-top: 1px solid var(--border);
  }
  .exercise-card.open .exercise-body { display: block; }

  /* SETS TABLE */
  .sets-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 0.75rem;
  }

  .sets-table th {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    text-align: left;
    padding: 0 0.5rem 0.5rem;
  }
  .sets-table th:first-child { padding-left: 0; width: 48px; }

  .set-row td {
    padding: 4px 0.5rem;
    vertical-align: middle;
  }
  .set-row td:first-child { padding-left: 0; }

  .set-num {
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    color: var(--muted);
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid var(--border);
    border-radius: 2px;
  }

  .set-input {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 1rem;
    padding: 6px 10px;
    border-radius: 3px;
    width: 90px;
    transition: border-color 0.15s;
    -moz-appearance: textfield;
    text-align: center;
  }
  .set-input::-webkit-inner-spin-button,
  .set-input::-webkit-outer-spin-button { -webkit-appearance: none; }
  .set-input:focus { outline: none; border-color: var(--accent); background: #1e1e1e; }

  .set-complete-btn {
    width: 32px;
    height: 32px;
    border-radius: 2px;
    border: 1.5px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    font-size: 1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .set-complete-btn:hover { border-color: var(--accent); color: var(--accent); }
  .set-complete-btn.done { background: var(--accent); border-color: var(--accent); color: #000; }
  .set-row.completed td { opacity: 0.5; }
  .set-row.completed .set-complete-btn { opacity: 1; }

  .set-del-btn {
    background: transparent;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 1rem;
    padding: 4px 6px;
    border-radius: 2px;
    transition: color 0.15s;
  }
  .set-del-btn:hover { color: #ff4d4d; }

  .card-actions {
    display: flex;
    gap: 8px;
    margin-top: 0.75rem;
    padding-top: 0.75rem;
    border-top: 1px solid var(--border);
  }

  .btn-add-set {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 6px 16px;
    border: 1.5px solid var(--border);
    background: transparent;
    color: var(--muted);
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-add-set:hover { border-color: var(--accent); color: var(--accent); }

  .btn-timer {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 6px 16px;
    border: 1.5px solid var(--border);
    background: transparent;
    color: var(--muted);
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .btn-timer:hover { border-color: #00c2ff; color: #00c2ff; }

  /* ADD EXERCISE */
  .add-exercise-bar {
    display: flex;
    gap: 8px;
    margin-top: 1.5rem;
    animation: fadeUp 0.3s ease both;
  }

  .add-exercise-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 10px 14px;
    border-radius: 3px;
    transition: border-color 0.15s;
  }
  .add-exercise-input::placeholder { color: var(--muted); font-weight: 400; text-transform: none; }
  .add-exercise-input:focus { outline: none; border-color: var(--accent); }

  .btn-add-exercise {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 0.1em;
    padding: 10px 20px;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 3px;
    cursor: pointer;
    transition: opacity 0.15s;
    white-space: nowrap;
  }
  .btn-add-exercise:hover { opacity: 0.85; }

  /* TIMER MODAL */
  .timer-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 200;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
  }
  .timer-overlay.show { display: flex; }

  .timer-modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 2.5rem 2rem;
    width: min(380px, 90vw);
    text-align: center;
    animation: popIn 0.2s ease;
    position: relative;
  }

  .timer-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 1rem;
  }

  .timer-display {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 5rem;
    letter-spacing: 0.05em;
    line-height: 1;
    color: var(--accent);
    margin-bottom: 1.5rem;
    position: relative;
  }

  .timer-ring {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 160px;
    height: 160px;
    pointer-events: none;
    opacity: 0.3;
  }

  .timer-presets {
    display: flex;
    gap: 6px;
    justify-content: center;
    margin-bottom: 1.5rem;
  }

  .preset-btn {
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    padding: 5px 12px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .preset-btn:hover, .preset-btn.active { border-color: var(--accent); color: var(--accent); }

  .custom-time-row {
    display: flex;
    gap: 8px;
    justify-content: center;
    align-items: center;
    margin-bottom: 1.5rem;
  }

  .custom-time-input {
    width: 70px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 1.1rem;
    text-align: center;
    padding: 6px;
    border-radius: 3px;
  }
  .custom-time-input:focus { outline: none; border-color: var(--accent); }
  .custom-time-input::-webkit-inner-spin-button { -webkit-appearance: none; }

  .custom-time-sep {
    font-family: 'DM Mono', monospace;
    font-size: 1.2rem;
    color: var(--muted);
  }

  .timer-controls {
    display: flex;
    gap: 8px;
    justify-content: center;
  }

  .timer-btn {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 0.1em;
    padding: 10px 28px;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.15s;
    border: none;
  }
  .timer-start { background: var(--accent); color: #000; }
  .timer-start:hover { opacity: 0.85; }
  .timer-pause { background: var(--surface2); border: 1px solid var(--border); color: var(--text); }
  .timer-pause:hover { border-color: var(--accent); }
  .timer-reset { background: transparent; border: 1px solid var(--border); color: var(--muted); }
  .timer-reset:hover { border-color: #ff4d4d; color: #ff4d4d; }
  .timer-close {
    position: absolute;
    top: 12px;
    right: 14px;
    background: transparent;
    border: none;
    color: var(--muted);
    font-size: 1.3rem;
    cursor: pointer;
    line-height: 1;
    padding: 4px;
  }
  .timer-close:hover { color: var(--text); }

  /* PROGRESS BAR */
  .day-progress {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 2rem;
    animation: fadeUp 0.3s ease both;
  }
  .progress-bar-track {
    flex: 1;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.4s ease;
    width: 0%;
  }
  .progress-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    white-space: nowrap;
  }

  /* ANIMATIONS */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes popIn {
    from { opacity: 0; transform: scale(0.92); }
    to { opacity: 1; transform: scale(1); }
  }

  /* MOBILE TWEAKS */
  @media (max-width: 600px) {
    header { padding: 0 1rem; }
    main { padding: 1.5rem 1rem 6rem; }
    .day-pills { gap: 4px; }
    .day-pill { font-size: 0.85rem; padding: 3px 10px; }
    .set-input { width: 72px; }
    .sets-table th, .sets-table td { font-size: 0.8rem; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">BRO<span>SPLIT</span></div>
  <div class="day-pills" id="dayPills"></div>
</header>

<main>
  <div class="day-header" id="dayHeader">
    <div class="day-number" id="dayNumber"></div>
    <div class="day-title" id="dayTitle"></div>
  </div>

  <div class="day-progress">
    <div class="progress-bar-track"><div class="progress-bar-fill" id="progressFill"></div></div>
    <div class="progress-label" id="progressLabel">0 / 0 sets</div>
  </div>

  <div class="exercises-grid" id="exercisesGrid"></div>

  <div class="add-exercise-bar">
    <input class="add-exercise-input" id="addExInput" placeholder="Add exercise..." />
    <button class="btn-add-exercise" onclick="addExercise()">+ Add</button>
  </div>
</main>

<!-- Timer Modal -->
<div class="timer-overlay" id="timerOverlay">
  <div class="timer-modal">
    <button class="timer-close" onclick="closeTimer()">✕</button>
    <div class="timer-label">REST TIMER</div>
    <div class="timer-display" id="timerDisplay">01:30</div>
    <div class="timer-presets">
      <button class="preset-btn" onclick="setPreset(30)">30s</button>
      <button class="preset-btn active" onclick="setPreset(90)">1:30</button>
      <button class="preset-btn" onclick="setPreset(120)">2:00</button>
      <button class="preset-btn" onclick="setPreset(180)">3:00</button>
    </div>
    <div class="custom-time-row">
      <input class="custom-time-input" id="customMin" type="number" min="0" max="59" placeholder="mm" />
      <span class="custom-time-sep">:</span>
      <input class="custom-time-input" id="customSec" type="number" min="0" max="59" placeholder="ss" />
      <button class="btn-add-set" onclick="setCustomTime()">Set</button>
    </div>
    <div class="timer-controls">
      <button class="timer-btn timer-start" id="timerStartBtn" onclick="toggleTimer()">START</button>
      <button class="timer-btn timer-reset" onclick="resetTimer()">RESET</button>
    </div>
  </div>
</div>

<script>
// ─── DATA ───────────────────────────────────────────────────────────────────

const DAYS = [
  {
    key: 'mon', label: 'MON', name: 'Monday',
    muscles: ['Chest', 'Biceps'],
    exercises: [
      { name: 'Barbell Bench Press', tag: 'primary', sets: [{w:'',r:'',done:false},{w:'',r:'',done:false},{w:'',r:'',done:false},{w:'',r:'',done:false}] },
      { name: 'Incline Dumbbell Press', tag: 'primary', sets: [{w:'',r:'',done:false},{w:'',r:'',done:false},{w:'',r:'',done:false}] },
      { name: 'Cable Fly', tag: 'secondary', sets: [{w:'',r:'',done:false},{w:'',r:'',done:false},{w:'',r:'',done:false}] },
      { name: 'Barbell Curl', tag: 'secondary', sets: [{w:'',r:'',done:false},{w:'',r:'',done:false},{w:'',r:'',done:false}] },
      { name: 'Hammer Curl', tag: 'secondary', sets: [{w:'',r:'',done:false},{w:'',r:'',done:false},{w:'',r:'',done:false}] },
    ]
  },
  {
    key: 'tue', label: 'TUE', name: 'Tuesday',
    muscles: ['Back', 'Triceps'],
    exercises: [
      { name: 'Deadlift', tag: 'primary', sets: [{w:'',r:'',done:false},{w:'',r:'',done:false},{w:'',r:'',done:false},{w:'',r:'',done:false}] },
      { name: 'Pull-Ups', tag: 'primary', sets: [{w:'',r:'',done:false},{w:'',r:'',done:false},{w:'',r:'',done:false}] },
      { name: 'Seated Cable Row', tag: 'secondary', sets: [{w:'',r:'',done:false},{w:'',r:'',done:false},{w:'',r:'',done:false}] },
      { name: 'Skull Crushers', tag: 'secondary', sets: [{w:'',r:'',done:false},{w:'',r:'',done:false},{w:'',r:'',done:false}] },
      { name: 'Tricep Pushdown', tag: 'secondary', sets: [{w:'',r:'',done:false},{w:'',r:'',done:false},{w:'',r:'',done:false}] },
    ]
  },
  {
    key: 'wed', label: 'WED', name: 'Wednesday',
    muscles: ['Shoulders', 'Traps & Arms'],
    exercises: [
      { name: 'Overhead Press', tag: 'primary', sets: [{w:'',r:'',done:false},{w:'',r:'',done:false},{w:'',r:'',done:false},{w:'',r:'',done:false}] },
      { name: 'Lateral Raise', tag: 'secondary', sets: [{w:'',r:'',done:false},{w:'',r:'',done:false},{w:'',r:'',done:false}] },
      { name: 'Barbell Shrug', tag: 'primary', sets: [{w:'',r:'',done:false},{w:'',r:'',done:false},{w:'',r:'',done:false}] },
      { name: 'Face Pull', tag: 'secondary', sets: [{w:'',r:'',done:false},{w:'',r:'',done:false},{w:'',r:'',done:false}] },
      { name: 'Dumbbell Curl', tag: 'secondary', sets: [{w:'',r:'',done:false},{w:'',r:'',done:false},{w:'',r:'',done:false}] },
      { name: 'Overhead Tricep Extension', tag: 'secondary', sets: [{w:'',r:'',done:false},{w:'',r:'',done:false},{w:'',r:'',done:false}] },
    ]
  },
  {
    key: 'thu', label: 'THU', name: 'Thursday',
    muscles: ['Legs', 'Lower Back'],
    exercises: [
      { name: 'Back Squat', tag: 'primary', sets: [{w:'',r:'',done:false},{w:'',r:'',done:false},{w:'',r:'',done:false},{w:'',r:'',done:false}] },
      { name: 'Romanian Deadlift', tag: 'primary', sets: [{w:'',r:'',done:false},{w:'',r:'',done:false},{w:'',r:'',done:false}] },
      { name: 'Leg Press', tag: 'secondary', sets: [{w:'',r:'',done:false},{w:'',r:'',done:false},{w:'',r:'',done:false}] },
      { name: 'Leg Curl', tag: 'secondary', sets: [{w:'',r:'',done:false},{w:'',r:'',done:false},{w:'',r:'',done:false}] },
      { name: 'Standing Calf Raise', tag: 'secondary', sets: [{w:'',r:'',done:false},{w:'',r:'',done:false},{w:'',r:'',done:false}] },
      { name: 'Hyperextension', tag: 'secondary', sets: [{w:'',r:'',done:false},{w:'',r:'',done:false},{w:'',r:'',done:false}] },
    ]
  },
  {
    key: 'fri', label: 'FRI', name: 'Friday',
    muscles: ['Chest', 'Biceps'],
    exercises: [
      { name: 'Dumbbell Bench Press', tag: 'primary', sets: [{w:'',r:'',done:false},{w:'',r:'',done:false},{w:'',r:'',done:false},{w:'',r:'',done:false}] },
      { name: 'Chest Dip', tag: 'primary', sets: [{w:'',r:'',done:false},{w:'',r:'',done:false},{w:'',r:'',done:false}] },
      { name: 'Pec Deck', tag: 'secondary', sets: [{w:'',r:'',done:false},{w:'',r:'',done:false},{w:'',r:'',done:false}] },
      { name: 'Incline Curl', tag: 'secondary', sets: [{w:'',r:'',done:false},{w:'',r:'',done:false},{w:'',r:'',done:false}] },
      { name: 'Cable Curl', tag: 'secondary', sets: [{w:'',r:'',done:false},{w:'',r:'',done:false},{w:'',r:'',done:false}] },
    ]
  },
];

// load from localStorage
function loadState() {
  try {
    const saved = JSON.parse(localStorage.getItem('brosplit_v2') || '{}');
    DAYS.forEach(d => {
      if (saved[d.key]) {
        d.exercises = saved[d.key];
      }
    });
  } catch(e) {}
}

function saveState() {
  const out = {};
  DAYS.forEach(d => { out[d.key] = d.exercises; });
  localStorage.setItem('brosplit_v2', JSON.stringify(out));
}

// ─── STATE ──────────────────────────────────────────────────────────────────
let currentDay = 0;

// ─── TIMER ──────────────────────────────────────────────────────────────────
let timerDuration = 90;
let timerRemaining = 90;
let timerInterval = null;
let timerRunning = false;
let beepCtx = null;

function getAudioCtx() {
  if (!beepCtx) beepCtx = new (window.AudioContext || window.webkitAudioContext)();
  return beepCtx;
}

function beep() {
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = 880;
    gain.gain.setValueAtTime(0.4, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.4);
  } catch(e) {}
}

function openTimer() {
  document.getElementById('timerOverlay').classList.add('show');
  updateTimerDisplay();
}
function closeTimer() {
  document.getElementById('timerOverlay').classList.remove('show');
}

function setPreset(secs) {
  clearInterval(timerInterval);
  timerRunning = false;
  timerDuration = secs;
  timerRemaining = secs;
  document.getElementById('timerStartBtn').textContent = 'START';
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  updateTimerDisplay();
}

function setCustomTime() {
  const m = parseInt(document.getElementById('customMin').value) || 0;
  const s = parseInt(document.getElementById('customSec').value) || 0;
  const total = m * 60 + s;
  if (total < 1) return;
  clearInterval(timerInterval);
  timerRunning = false;
  timerDuration = total;
  timerRemaining = total;
  document.getElementById('timerStartBtn').textContent = 'START';
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  updateTimerDisplay();
}

function toggleTimer() {
  if (timerRunning) {
    clearInterval(timerInterval);
    timerRunning = false;
    document.getElementById('timerStartBtn').textContent = 'RESUME';
  } else {
    if (timerRemaining <= 0) { timerRemaining = timerDuration; }
    timerRunning = true;
    document.getElementById('timerStartBtn').textContent = 'PAUSE';
    timerInterval = setInterval(() => {
      timerRemaining--;
      updateTimerDisplay();
      if (timerRemaining <= 0) {
        clearInterval(timerInterval);
        timerRunning = false;
        document.getElementById('timerStartBtn').textContent = 'START';
        beep();
        document.getElementById('timerDisplay').style.color = '#ff4d00';
        setTimeout(() => document.getElementById('timerDisplay').style.color = 'var(--accent)', 600);
      }
    }, 1000);
  }
}

function resetTimer() {
  clearInterval(timerInterval);
  timerRunning = false;
  timerRemaining = timerDuration;
  document.getElementById('timerStartBtn').textContent = 'START';
  updateTimerDisplay();
}

function updateTimerDisplay() {
  const m = Math.floor(timerRemaining / 60);
  const s = timerRemaining % 60;
  document.getElementById('timerDisplay').textContent =
    String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
}

// ─── RENDER ─────────────────────────────────────────────────────────────────

function renderDayPills() {
  const container = document.getElementById('dayPills');
  container.innerHTML = '';
  DAYS.forEach((d, i) => {
    const btn = document.createElement('button');
    btn.className = 'day-pill' + (i === currentDay ? ' active' : '');
    btn.textContent = d.label;
    btn.onclick = () => { currentDay = i; render(); };
    container.appendChild(btn);
  });
}

function renderHeader() {
  const day = DAYS[currentDay];
  document.getElementById('dayNumber').textContent = day.name.toUpperCase() + ' · DAY ' + (currentDay + 1) + ' OF 5';
  const title = document.getElementById('dayTitle');
  title.innerHTML = day.muscles.map((m, i) =>
    `<span class="${i===0?'muscle-a':'muscle-b'}">${m}</span>${i < day.muscles.length-1 ? '<span class="sep">&</span>' : ''}`
  ).join('');
}

function renderProgress() {
  const day = DAYS[currentDay];
  let total = 0, done = 0;
  day.exercises.forEach(ex => {
    ex.sets.forEach(s => { total++; if(s.done) done++; });
  });
  const pct = total ? Math.round((done/total)*100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = done + ' / ' + total + ' sets';
}

function renderExercises() {
  const grid = document.getElementById('exercisesGrid');
  const day = DAYS[currentDay];
  grid.innerHTML = '';
  day.exercises.forEach((ex, ei) => {
    const card = document.createElement('div');
    card.className = 'exercise-card' + (ex.open ? ' open' : '');
    card.style.animationDelay = (ei * 0.05) + 's';

    card.innerHTML = `
      <div class="exercise-card-header" onclick="toggleCard(${ei})">
        <div class="exercise-name">${ex.name}</div>
        <span class="exercise-tag ${ex.tag === 'primary' ? 'tag-primary' : 'tag-secondary'}">${ex.tag}</span>
        <span class="exercise-chevron">▾</span>
      </div>
      <div class="exercise-body">
        <table class="sets-table">
          <thead>
            <tr>
              <th>SET</th>
              <th>WEIGHT (lbs)</th>
              <th>REPS</th>
              <th>✓</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="sets-${ei}"></tbody>
        </table>
        <div class="card-actions">
          <button class="btn-add-set" onclick="addSet(${ei})">+ Set</button>
          <button class="btn-timer" onclick="openTimer()">⏱ Rest Timer</button>
        </div>
      </div>
    `;
    grid.appendChild(card);
    renderSets(ei);
  });
}

function renderSets(ei) {
  const day = DAYS[currentDay];
  const ex = day.exercises[ei];
  const tbody = document.getElementById('sets-' + ei);
  if (!tbody) return;
  tbody.innerHTML = '';
  ex.sets.forEach((set, si) => {
    const tr = document.createElement('tr');
    tr.className = 'set-row' + (set.done ? ' completed' : '');
    tr.innerHTML = `
      <td><div class="set-num">${si+1}</div></td>
      <td><input class="set-input" type="number" min="0" placeholder="0" value="${set.w}"
        oninput="updateSet(${ei},${si},'w',this.value)" /></td>
      <td><input class="set-input" type="number" min="0" placeholder="0" value="${set.r}"
        oninput="updateSet(${ei},${si},'r',this.value)" /></td>
      <td><button class="set-complete-btn ${set.done?'done':''}" onclick="toggleSetDone(${ei},${si})">${set.done?'✓':'○'}</button></td>
      <td><button class="set-del-btn" onclick="deleteSet(${ei},${si})" title="Remove set">✕</button></td>
    `;
    tbody.appendChild(tr);
  });
}

function render() {
  renderDayPills();
  renderHeader();
  renderProgress();
  renderExercises();
}

// ─── ACTIONS ────────────────────────────────────────────────────────────────

function toggleCard(ei) {
  const day = DAYS[currentDay];
  day.exercises[ei].open = !day.exercises[ei].open;
  renderExercises();
}

function updateSet(ei, si, field, val) {
  DAYS[currentDay].exercises[ei].sets[si][field] = val;
  saveState();
}

function toggleSetDone(ei, si) {
  const set = DAYS[currentDay].exercises[ei].sets[si];
  set.done = !set.done;
  saveState();
  renderSets(ei);
  renderProgress();
  // re-apply completed class on the card
  const card = document.querySelectorAll('.exercise-card')[ei];
  if(card) {
    const rows = card.querySelectorAll('.set-row');
    rows[si].classList.toggle('completed', set.done);
    rows[si].querySelector('.set-complete-btn').classList.toggle('done', set.done);
    rows[si].querySelector('.set-complete-btn').textContent = set.done ? '✓' : '○';
  }
}

function addSet(ei) {
  DAYS[currentDay].exercises[ei].sets.push({ w: '', r: '', done: false });
  saveState();
  renderSets(ei);
  renderProgress();
}

function deleteSet(ei, si) {
  const sets = DAYS[currentDay].exercises[ei].sets;
  if (sets.length <= 1) return;
  sets.splice(si, 1);
  saveState();
  renderSets(ei);
  renderProgress();
}

function addExercise() {
  const input = document.getElementById('addExInput');
  const name = input.value.trim();
  if (!name) return;
  DAYS[currentDay].exercises.push({
    name,
    tag: 'secondary',
    open: true,
    sets: [{ w: '', r: '', done: false }, { w: '', r: '', done: false }, { w: '', r: '', done: false }]
  });
  input.value = '';
  saveState();
  renderExercises();
  renderProgress();
}

document.getElementById('addExInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') addExercise();
});

// close overlay on bg click
document.getElementById('timerOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeTimer();
});

// ─── INIT ────────────────────────────────────────────────────────────────────
loadState();

// default open first exercise on each day
DAYS.forEach(d => { if(d.exercises[0]) d.exercises[0].open = true; });

// auto-select today
const todayMap = {1:0,2:1,3:2,4:3,5:4};
const dow = new Date().getDay();
if (todayMap[dow] !== undefined) currentDay = todayMap[dow];

render();
</script>
</body>
</html>
